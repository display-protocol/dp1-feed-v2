services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dp1_feed
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: dp1-feed-v2/Dockerfile
    ports:
      - "8787:8787"
    env_file:
      - config/.env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
