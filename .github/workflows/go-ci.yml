name: Go CI

on:
  pull_request:
    branches:
      - main
      - master
      - develop
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: go-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-quality:
    name: Format, lint, vet, and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Go module
        id: detect
        shell: bash
        run: |
          if [[ -f go.mod ]]; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
            echo "No go.mod found; skipping Go checks for this revision."
          fi

      - name: Setup Go
        if: steps.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        if: steps.detect.outputs.has_go == 'true'
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            echo "These files are not gofmt-formatted:"
            printf '%s\n' "$unformatted"
            exit 1
          fi

      - name: Vet
        if: steps.detect.outputs.has_go == 'true'
        run: go vet ./...

      - name: Lint
        if: steps.detect.outputs.has_go == 'true'
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5
          args: --config=.golangci.yml ./...

      - name: Test
        if: steps.detect.outputs.has_go == 'true'
        run: go test -count=1 -covermode=atomic -coverprofile=coverage.out ./...

      - name: Race test
        if: steps.detect.outputs.has_go == 'true'
        run: go test -count=1 -race ./...

      - name: Upload coverage artifact
        if: steps.detect.outputs.has_go == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          if-no-files-found: error
