name: Lint

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**/*.go'
      - '*.go'
      - 'go.mod'
      - 'go.sum'
      - '**/*.md'
      - '.golangci.yml'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/lint.yaml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**/*.go'
      - '*.go'
      - 'go.mod'
      - 'go.sum'
      - '**/*.md'
      - '.golangci.yml'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/lint.yaml'

permissions:
  contents: read

jobs:
  golang:
    name: Lint and build (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || {
            echo "go.mod or go.sum needs tidying. Run 'go mod tidy' and commit changes."
            exit 1
          }

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.4.0
          working-directory: ./

      - name: Build server
        run: go build -v ./cmd/server

      - name: Build all packages
        run: go build -v ./...

  markdown:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"
