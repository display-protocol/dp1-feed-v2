name: Unit Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**/*.go'
      - '*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/test.yaml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**/*.go'
      - '*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/test.yaml'

permissions:
  contents: read

jobs:
  test:
    name: Unit tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run unit tests with coverage
        run: |
          go test -v -race -count=1 -timeout=5m \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=$(go list ./... | grep -v '/mocks' | grep -v '/cmd/' | paste -sd, -) \
            ./...
          # Exclude generated mocks and main packages from coverage
          cat coverage.out | grep -v "/mocks/" | grep -v "/cmd/" > coverage.filtered.out
          mv coverage.filtered.out coverage.out

      - name: Display coverage summary
        run: go tool cover -func=coverage.out | tail -20

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.out
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true
