name: Integration Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**/*.go'
      - '*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/test.yaml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**/*.go'
      - '*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/test.yaml'

permissions:
  contents: read

jobs:
  integration-test:
    name: Integration tests with testcontainers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run integration tests with coverage
        run: go test -v -race -count=1 -timeout=10m -tags=integration -coverprofile=coverage-integration.out -covermode=atomic ./internal/store/

      - name: Generate coverage report
        run: go tool cover -func=coverage-integration.out

      - name: Upload integration coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage-integration.out
          flags: integration
          fail_ci_if_error: false
        continue-on-error: true

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage-integration.out', 'utf8');
            const lines = coverage.split('\n');
            const totalLine = lines.find(line => line.includes('total:')) || lines[lines.length - 2];
            const match = totalLine.match(/(\d+\.\d+)%/);
            const percentage = match ? match[1] : 'N/A';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🧪 Integration Test Coverage\n\n**Coverage:** ${percentage}%`
            });
