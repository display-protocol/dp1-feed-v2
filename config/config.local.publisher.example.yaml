# Ready-to-run local config for the publisher/passkey/note prototype.
# Copy to config/config.yaml and replace only the signing key.

server:
  host: "0.0.0.0"
  port: 8787
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

database:
  url: "postgres://postgres:postgres@localhost:5432/dp1_feed?sslmode=disable"
  max_conns: 16
  min_conns: 2
  max_conn_lifetime: 1h

auth:
  api_key: "dev-change-me"
  publisher_tokens: []

publisher_auth:
  rp_id: "localhost"
  rp_display_name: "Feral File Publisher"
  rp_origins:
    - "http://localhost:8787"
  session_cookie_name: "dp1_publisher_session"
  ceremony_cookie_name: "dp1_publisher_ceremony"
  session_ttl: 720h
  ceremony_ttl: 15m
  domain_resolver_url: "https://domain-name-resolvers.autonomy-system.workers.dev"
  domain_resolver_api_key: ""
  ens_rpc_url: ""

sentry:
  dsn: ""

logging:
  debug: true

extensions:
  enabled: true

playlist:
  fetch_timeout: 30s
  fetch_max_body_bytes: 4194304
  # Replace this before running:
  # openssl rand -hex 32
  signing_key_hex: "replace-me-with-openssl-rand-hex-32"
  public_base_url: "http://localhost:8787"
